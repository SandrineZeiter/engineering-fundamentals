name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: checkoutrepository
        uses: actions/checkout@v5

      - name: install node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: install dependencies
        run: npm install

      - name: run tests
        run: npm test